name: Auto Assign And Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assign-author:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign PR to author
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login
            const pullNumber = context.payload.pull_request.number
            const isBestEffortError = (error) => [403, 404, 422].includes(error.status)

            try {
              await github.rest.issues.checkUserCanBeAssigned({
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignee: author,
              })

              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                assignees: [author],
              })
            } catch (error) {
              const message = `Failed to add assignee: ${error.message}`
              if (isBestEffortError(error)) {
                core.warning(message)
              } else {
                core.setFailed(message)
              }
            }

  request-reviewers:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Request reviewers
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login
            const pullNumber = context.payload.pull_request.number
            const reviewers = ['hdg0116', 'gyogyo05', 'jeniferkim'].filter((reviewer) => reviewer !== author)
            const isBestEffortError = (error) => [403, 404, 422].includes(error.status)

            if (reviewers.length === 0) {
              core.info('No reviewers to request.')
              return
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
                reviewers,
              })
            } catch (error) {
              const message = `Failed to request reviewers: ${error.message}`
              if (isBestEffortError(error)) {
                core.warning(message)
              } else {
                core.setFailed(message)
              }
            }
